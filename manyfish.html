<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游动小鱼儿</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #edf9f9;
            font-family: Consolas, monospace;
            overflow: hidden;
        }
        .fish-item {
            position: absolute;
            white-space: pre;
        }
        /* HUD 和模态样式 */
        #hud {
            position: fixed;
            right: 16px;
            top: 12px;
            background: rgba(255,255,255,0.9);
            border-radius: 8px;
            padding: 8px 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
            font-family: Arial, "Microsoft YaHei", sans-serif;
            color: #0d3a6a;
            z-index: 9999;
            text-align: right;
        }
        #hud .line { margin: 4px 0; }
        #hud button { margin-left: 8px; padding: 6px 8px; border-radius:6px; border: none; background:#1f4f8b; color:#fff; cursor:pointer }
        #overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.45);
            z-index: 10000;
        }
        #overlay .box {
            background: #fff;
            padding: 18px 22px;
            border-radius: 10px;
            text-align: center;
            min-width: 260px;
        }
    </style>
</head>
<body>
<div id="hud">
    <div class="line">计时: <span id="timerDisplay">--</span></div>
    <div class="line">得分: <span id="scoreDisplay">0</span> 最高: <span id="highDisplay">0</span></div>
    <div class="line"><button id="startBtn">开始 30s</button><button id="stopBtn">退出</button></div>
</div>
<div id="overlay"><div class="box"><div id="resultText"></div><div style="margin-top:12px"><button id="replayBtn">再来一次</button> <button id="closeBtn">退出</button></div></div></div>
<script>
// 小鱼两套摆尾帧
const fishFrames = [
    '‹•))>>=‹',
    '‹•))>=‹'
];
const container = document.body;

// 生成随机工具函数
function randomRange(min, max) {
    return Math.random() * (max - min) + min;
}
function randomColor() {
    const hue = Math.floor(randomRange(5, 355));
    return `hsl(${hue}, 75%, 55%)`;
}

// 生成控制：初始并发数量 + 动态生成速率
let initialFish = 40;
let spawnInterval = 2000; // 毫秒
const minSpawnInterval = 80; // 最低间隔，避免无限加速
const spawnAccelerateFactor = 0.85; // 每次点击后乘以该系数
let spawnTimer = null;

// 点击计数（仅用于可能的显示或调试）
let clickedCount = 0;

function accelerateSpawn() {
    spawnInterval = Math.max(minSpawnInterval, Math.floor(spawnInterval * spawnAccelerateFactor));
    if (spawnTimer) {
        clearInterval(spawnTimer);
        spawnTimer = setInterval(() => createOneFish(), spawnInterval);
    }
}

function checkAllCleared() {
    const remaining = document.querySelectorAll('.fish-item').length;
    if (remaining === 0) {
        // 停止自动生成
        if (spawnTimer) {
            clearInterval(spawnTimer);
            spawnTimer = null;
        }
        // 显示提示
        const el = document.getElementById('clearMsg');
        if (el) el.style.display = 'block';
    }
}

// 创建单条小鱼，返回元素
function createOneFish() {
    const fishDiv = document.createElement('div');
    fishDiv.className = 'fish-item';
    const fontSize = randomRange(12, 48);
    fishDiv.style.fontSize = `${fontSize}px`;
    fishDiv.style.color = randomColor();

    // 随机初始坐标
    let x = randomRange(0, window.innerWidth);
    let y = randomRange(0, window.innerHeight);
    fishDiv.style.left = `${x}px`;
    fishDiv.style.top = `${y}px`;

    // 随机运动向量
    const speed = randomRange(0.2, 1.6);
    const angle = randomRange(0, Math.PI * 2);
    const dx = Math.cos(angle) * speed;
    const dy = Math.sin(angle) * speed;

    // 摆尾
    let frameIdx = 0;
    const swingGap = randomRange(28, 520);
    const swingTimer = setInterval(() => {
        frameIdx = (frameIdx + 1) % fishFrames.length;
        fishDiv.textContent = fishFrames[frameIdx];
    }, swingGap);

    // 点击移除并加速生成
    fishDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        clearInterval(swingTimer);
        clearInterval(moveTimer);
        fishDiv.remove();
        if (sessionActive) {
            sessionScore += 1;
            updateHUD();
        }
        accelerateSpawn();
        checkAllCleared();
    });

    container.appendChild(fishDiv);

    // 位置更新
    const moveTimer = setInterval(() => {
        x += dx;
        y += dy;
        fishDiv.style.left = `${x}px`;
        fishDiv.style.top = `${y}px`;

        const outX = x < -80 || x > window.innerWidth + 80;
        const outY = y < -80 || y > window.innerHeight + 80;
        if (outX || outY) {
            clearInterval(swingTimer);
            clearInterval(moveTimer);
            // 如果鱼超出则移除并生成一条新鱼（维持页面活跃）
            if (fishDiv.parentElement) fishDiv.remove();
            // 仅在未全部清空时补充新鱼
            if (document.querySelectorAll('.fish-item').length > 0 || spawnTimer) {
                createOneFish();
            }
        }
    }, 30);

    return fishDiv;
}

// 批量初始化
for (let i = 0; i < initialFish; i++) {
    createOneFish();
}

// 启动自动生成器：随着点击加速，spawnInterval 会变小
spawnTimer = setInterval(() => createOneFish(), spawnInterval);

// 在页面角落显示完成提示（初始隐藏）
const clearMsg = document.createElement('div');
clearMsg.id = 'clearMsg';
clearMsg.textContent = '恭喜，页面中已无小鱼！';
clearMsg.style.position = 'fixed';
clearMsg.style.right = '20px';
clearMsg.style.bottom = '20px';
clearMsg.style.padding = '10px 14px';
clearMsg.style.background = 'rgba(0,0,0,0.6)';
clearMsg.style.color = '#fff';
clearMsg.style.borderRadius = '8px';
clearMsg.style.display = 'none';
document.body.appendChild(clearMsg);

// 游戏会话：30 秒计时、计分、最高记录
let sessionDuration = 30; // 秒
let sessionActive = false;
let sessionTimer = null;
let timeLeft = sessionDuration;
let sessionScore = 0;
let highScore = Number(localStorage.getItem('manyFishHighScore') || 0);

const timerDisplay = document.getElementById('timerDisplay');
const scoreDisplay = document.getElementById('scoreDisplay');
const highDisplay = document.getElementById('highDisplay');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const overlay = document.getElementById('overlay');
const resultText = document.getElementById('resultText');
const replayBtn = document.getElementById('replayBtn');
const closeBtn = document.getElementById('closeBtn');

highDisplay.textContent = highScore;

actionStartGame = () => startSession();

function updateHUD() {
    timerDisplay.textContent = sessionActive ? `${timeLeft}s` : `-`;
    scoreDisplay.textContent = sessionScore;
    highDisplay.textContent = highScore;
}

function startSession() {
    // 重置
    if (sessionActive) return;
    sessionActive = true;
    timeLeft = sessionDuration;
    sessionScore = 0;
    updateHUD();
    overlay.style.display = 'none';
    // 开始倒计时
    sessionTimer = setInterval(() => {
        timeLeft -= 1;
        updateHUD();
        if (timeLeft <= 0) {
            endSession();
        }
    }, 1000);
}

function endSession() {
    sessionActive = false;
    if (sessionTimer) {
        clearInterval(sessionTimer);
        sessionTimer = null;
    }
    // 更新最高纪录
    if (sessionScore > highScore) {
        highScore = sessionScore;
        localStorage.setItem('manyFishHighScore', String(highScore));
    }
    updateHUD();
    // 显示结果覆盖层
    resultText.innerHTML = `<div style="font-size:18px">本轮得分：${sessionScore}</div><div style="margin-top:8px;color:#666">最高纪录：${highScore}</div>`;
    overlay.style.display = 'flex';
}

replayBtn.addEventListener('click', () => {
    overlay.style.display = 'none';
    startSession();
});
closeBtn.addEventListener('click', () => {
    overlay.style.display = 'none';
    // 停止自动生成，退出模式
    if (spawnTimer) { clearInterval(spawnTimer); spawnTimer = null; }
});

startBtn.addEventListener('click', startSession);
stopBtn.addEventListener('click', () => {
    // 退出并停止生成
    if (spawnTimer) { clearInterval(spawnTimer); spawnTimer = null; }
    sessionActive = false;
    if (sessionTimer) { clearInterval(sessionTimer); sessionTimer = null; }
    updateHUD();
});

// 点击页面任意处也可以显示当前剩余数量（可选）
document.body.addEventListener('click', (e) => {
    if (!e.target.classList || !e.target.classList.contains('fish-item')) {
        const left = document.querySelectorAll('.fish-item').length;
        console.log('Remaining fish:', left, 'spawnInterval(ms)=', spawnInterval);
    }
});
</script>
</body>
</html>
