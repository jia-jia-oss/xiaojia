<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索星空</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            /*星空渐变背景 */
            background: radial-gradient(circle at center, #403394, #121436);
            font-family: "Microsoft Yahei", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* 星星光点效果 */
        body::before{
            content: '';
            width: 100%;
            height: 100%;
            position: fixed;
            background-image: 
            radial-gradient(2px 2px at 20px 30px, #fff, transparent),
            radial-gradient(2px 2px at 60px 110px, #fff, transparent),
            radial-gradient(1.5px 1.5px at 120px 70px, #fff, transparent),
            radial-gradient(2px 2px at 180px 150px, #fff, transparent);
            background-size: 220px 220px;
            opacity: 0.8;
            z-index: 0;
        }
        h1{
            color:white;
            font-size:44px;
            margin-bottom:50px;
            z-index: 1;
            letter-spacing:4px;
        }
        .btn-wrap{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap:24px;
            z-index:1;
        }
        /*适配只有两个按钮居中布局*/
        .single-row{
            grid-column: 1 / span 2;
            text-align:center;
        }
        a{
            text-decoration:none;
            color:white;
            padding:20px 45px;
            background:rgba(255,255,255,0.14);
            backdrop-filter: blur(8px);
            border-radius:16px;
            font-size:20px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            display:block;
        }
        a:hover{
            background:rgba(255,255,255,0.25);
            transform: translateY(-4px);
        }
    </style>
</head>
<body>
    <h1>✨ 探索星空 ✨</h1>
    <div class="btn-wrap">
        <a href="manyfish.html">🐟 小鱼消消乐</a>
        <a href="snake.html">🐍 经典贪吃蛇</a>
        <!--后续新增游戏就继续在这里添加a标签-->
    </div>
</body>
</html>
